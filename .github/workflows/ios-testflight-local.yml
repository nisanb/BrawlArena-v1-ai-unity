name: iOS TestFlight (local export)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag holding ios-project.tgz
        required: false
        default: ios-export-latest

concurrency:
  group: ios-testflight-local
  cancel-in-progress: false

jobs:
  release:
    name: Sign and upload to TestFlight
    runs-on: macos-15
    steps:
      - name: Checkout (fastlane config only)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Download Xcode project from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ inputs.release_tag }}" --pattern ios-project.tgz --repo "${{ github.repository }}"

      - name: Extract Xcode project
        run: mkdir -p build && tar -C build -xzf ios-project.tgz

      - name: Restore executable bits (export was tarred on Windows)
        run: |
          find build -name "*.sh" -exec chmod +x {} +
          find build -type d -name "*.app" -prune -o -type f \( -name "usymtool" -o -name "bee_backend" -o -name "il2cpp" -o -name "UnityLinker" \) -exec chmod +x {} +

      - name: Select newest Xcode (App Store requires iOS 26 SDK)
        run: |
          ls -d /Applications/Xcode_*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install fastlane
        run: brew install fastlane

      - name: Build, sign, upload to TestFlight
        run: fastlane ios beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTH: ${{ secrets.MATCH_GIT_BASIC_AUTH }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
